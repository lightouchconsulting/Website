name: Weekly Blog Generator

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        run: |
          if [ -z "$GROQ_API_KEY" ]; then echo "ERROR: GROQ_API_KEY secret is not set" && exit 1; fi
          if [ -z "$GH_PAT" ]; then echo "ERROR: GH_PAT secret is not set" && exit 1; fi
          echo "Secrets verified OK"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Run blog generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: Website
        run: npm run blog-generator

      - name: Report completion
        run: echo "Blog generation complete for week $(date +%Y-W%V)"
